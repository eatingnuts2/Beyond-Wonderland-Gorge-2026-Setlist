<style>
:root {
  --bg:#07080c; --panel:#454545; --line:rgba(255,255,255,.14); --text:#fff;
  --start:17; --end:29.5; --hourHeight:86px;
}
*{box-sizing:border-box}
body{
  margin:0;
  position:relative;
  isolation:isolate;
  font-family:Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  color:var(--text);
  min-width:0;
  -webkit-text-size-adjust:100%;
  overscroll-behavior-x:none;
  background:
    radial-gradient(circle at 12% 18%, rgba(255, 74, 213, .30) 0 2px, transparent 3px 100px),
    radial-gradient(circle at 80% 12%, rgba(89, 220, 255, .34) 0 3px, transparent 4px 110px),
    radial-gradient(circle at 58% 28%, rgba(255, 214, 80, .24) 0 2px, transparent 3px 95px),
    radial-gradient(circle at 24% 72%, rgba(122, 255, 154, .26) 0 3px, transparent 4px 120px),
    radial-gradient(circle at 86% 76%, rgba(180, 98, 255, .30) 0 2px, transparent 3px 105px),
    radial-gradient(circle at 50% 0%, rgba(94, 209, 255, .22), transparent 34%),
    linear-gradient(135deg, #070414 0%, #111033 36%, #061924 66%, #120818 100%);
  background-attachment:fixed;
}
body:before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:linear-gradient(90deg,rgba(0,0,0,.58),rgba(0,0,0,.18),rgba(0,0,0,.58));
  pointer-events:none;
}
.app{
  position:relative;
  z-index:1;
  padding:clamp(18px, 4vw, 36px) max(12px, env(safe-area-inset-right)) 44px max(12px, env(safe-area-inset-left));
}
h1{
  font-size:clamp(38px, 10vw, 78px);
  text-align:center;
  margin:0;
  letter-spacing:-1.5px;
  font-weight:900;
  line-height:.95;
}
.rule{
  height:6px;
  width:min(560px, 64vw);
  background:white;
  border-radius:999px;
  margin:18px auto 22px;
}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  max-width:1120px;
  margin:0 auto 18px;
}
.dayTitle{
  font-size:clamp(22px, 5vw, 30px);
  font-weight:900;
  text-align:center;
  flex:1;
}
.location{
  font-size:clamp(16px, 4vw, 27px);
  font-weight:900;
  white-space:nowrap;
}
.controls{
  max-width:1120px;
  margin:0 auto 16px;
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
  flex-wrap:wrap;
}
.dayButtons{display:flex; gap:10px; flex-wrap:wrap;}
button{
  border:0;
  border-radius:999px;
  padding:12px 16px;
  min-height:44px;
  font-weight:800;
  cursor:pointer;
  background:#2d2d34;
  color:white;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
button.active{background:white;color:#111}
.searchWrap{
  position:relative;
  width:min(320px, 100%);
}
#search{
  width:100%;
  border:0;
  border-radius:999px;
  padding:13px 18px;
  min-height:44px;
  font-size:16px;
  outline:none;
}
#results{position:absolute; top:48px; left:0; right:0; background:#1e1e24; border-radius:16px; overflow:hidden; z-index:50; box-shadow:0 18px 40px rgba(0,0,0,.45); display:none; max-height:320px; overflow-y:auto;}
.result{padding:12px 14px; border-bottom:1px solid rgba(255,255,255,.08); cursor:pointer;}
.result:hover{background:#33333a}
.result b{display:block}
.result small{opacity:.8}
.board{
  width:100%;
  max-width:1120px;
  margin:0 auto;
  background:var(--panel);
  border-radius:28px;
  padding:30px 28px 54px 152px;
  position:relative;
  box-shadow:0 22px 55px rgba(0,0,0,.42);
  overflow:hidden;
}
.scheduleScroll{
  overflow-x:auto;
  overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;
  position:relative;
  z-index:1;
}

.stageHeaders{
  display:grid;
  grid-template-columns:repeat(9, minmax(96px, 1fr));
  gap:8px;
  margin-bottom:30px;
  min-width:920px;
}
.stageHead{
  height:78px;
  border-radius:14px;
  color:#28313a;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  line-height:1.02;
  padding:6px;
  font-size:16px;
  white-space:pre-wrap;
}
.grid{
  position:relative;
  display:grid;
  grid-template-columns:repeat(9, minmax(96px, 1fr));
  gap:8px;
  height:calc(var(--activeDurationHours, 12.5) * var(--hourHeight));
  min-width:920px;
}
.grid:before{
  content:""; position:absolute; inset:0; z-index:0;
  background:repeating-linear-gradient(to bottom, transparent 0, transparent calc(var(--hourHeight) - 2px), var(--line) calc(var(--hourHeight) - 1px), var(--line) var(--hourHeight));
}
.timeAxis{
  position:absolute;
  z-index:5; left:28px; top:143px; width:102px;
  height:calc(var(--activeDurationHours, 12.5) * var(--hourHeight));
  border:2px solid rgba(255,255,255,.18); border-radius:16px; background:rgba(0,0,0,.18);
}
.timeLabel{
  position:absolute;
  left:14px;
  right:14px;
  transform:translateY(-50%);
  font-size:21px;
  font-weight:800;
  white-space:nowrap;
  text-align:center;
  line-height:1;
}
.col{position:relative; z-index:1;}
.set{
  position:absolute;
  left:0;
  right:0;
  border-radius:8px;
  padding:8px 6px;
  overflow:hidden;
  color:#172027;
  border:2px solid rgba(0,0,0,.35);
  cursor:pointer;
  display:flex;
  flex-direction:column;
  justify-content:center;
  text-align:center;
  line-height:1.12;
  user-select:none;
  -webkit-user-select:none;
  transition:.15s transform,.15s box-shadow,.15s outline;
  -webkit-tap-highlight-color:transparent;
  touch-action:pan-x pan-y;
}
.set:hover{transform:scale(1.02); z-index:4; box-shadow:0 12px 28px rgba(0,0,0,.35);}
.set.selected{outline:5px solid #fff; box-shadow:0 0 0 9px rgba(255,255,255,.24),0 0 28px rgba(255,255,255,.65); z-index:5;}
.artist{
  font-weight:800;
  font-size:12.5px;
  letter-spacing:.01em;
  text-transform:none;
  overflow-wrap:anywhere;
}
.time{
  font-size:11.5px;
  font-weight:600;
  margin-top:5px;
  opacity:.9;
}
.footer{position:absolute; left:50%; bottom:18px; transform:translateX(-50%); white-space:nowrap; font-size:18px; font-weight:700; opacity:.9; pointer-events:none; text-align:center; user-select:none; -webkit-user-select:none;}
.note{
  max-width:1120px;

/* Safe iPhone layout: original table, horizontally scrollable and readable */


@media (max-width: 700px){
  :root{
    --mobileRowHeight:78px;
    --mobileAxisHeight:46px;
    --mobileLabelWidth:104px;
    --mobileTimelineWidth:1720px;
  }

  .app{
    padding:18px max(10px, env(safe-area-inset-right)) 38px max(10px, env(safe-area-inset-left));
  }

  h1{
    font-size:40px;
  }

  .rule{
    width:72vw;
    margin:14px auto 18px;
  }

  .topbar{
    display:block;
    text-align:center;
    margin-bottom:14px;
  }

  .location{
    margin-top:8px;
  }

  .controls{
    display:block;
  }

  .dayButtons{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:8px;
    margin-bottom:10px;
  }

  .dayButtons button{
    width:100%;
    padding:11px 8px;
  }

  .searchWrap{
    width:100%;
    margin-bottom:10px;
  }

  #results{
    max-height:260px;
  }

  .board{
    width:100%;
    max-width:none;
    border-radius:20px;
    padding:10px 8px 38px 8px !important;
    overflow:hidden;
  }

  .timeAxis,
  .stageHeaders{
    display:none !important;
  }

  .scheduleScroll{
    position:relative !important;
    overflow-x:auto !important;
    overflow-y:hidden !important;
    -webkit-overflow-scrolling:touch;
    width:100%;
    border-radius:16px;
    padding-bottom:8px;
  }

  .grid{
    display:block !important;
    position:relative !important;
    min-width:calc(var(--mobileLabelWidth) + var(--activeMobileTimelineWidth, var(--mobileTimelineWidth))) !important;
    width:calc(var(--mobileLabelWidth) + var(--activeMobileTimelineWidth, var(--mobileTimelineWidth))) !important;
    height:calc(var(--mobileAxisHeight) + (9 * var(--mobileRowHeight))) !important;
    background:
      repeating-linear-gradient(
        to right,
        transparent 0,
        transparent calc((var(--activeMobileTimelineWidth, var(--mobileTimelineWidth)) / var(--activeDurationHours, 12.5)) - 1px),
        rgba(255,255,255,.18) calc((var(--activeMobileTimelineWidth, var(--mobileTimelineWidth)) / var(--activeDurationHours, 12.5)) - 1px),
        rgba(255,255,255,.18) calc(var(--activeMobileTimelineWidth, var(--mobileTimelineWidth)) / var(--activeDurationHours, 12.5))
      ),
      repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent calc(var(--mobileRowHeight) - 1px),
        rgba(255,255,255,.18) calc(var(--mobileRowHeight) - 1px),
        rgba(255,255,255,.18) var(--mobileRowHeight)
      );
    background-position:var(--mobileLabelWidth) var(--mobileAxisHeight), 0 var(--mobileAxisHeight);
  }

  .grid:before{
    display:none !important;
  }

  .col{
    position:static !important;
  }

  .mobileTimeLabel{
    position:absolute;
    top:0;
    height:var(--mobileAxisHeight);
    transform:translateX(-50%);
    display:flex;
    align-items:center;
    justify-content:center;
    width:68px;
    color:#fff;
    font-size:13px;
    font-weight:900;
    white-space:nowrap;
    text-shadow:0 2px 8px rgba(0,0,0,.65);
    z-index:16;
    pointer-events:none;
  }

  .mobileStageLabel{
    position:sticky;
    left:0;
    width:var(--mobileLabelWidth);
    height:calc(var(--mobileRowHeight) - 8px);
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:#172027;
    font-size:11px;
    font-weight:900;
    line-height:1.05;
    white-space:pre-wrap;
    z-index:28;
    box-shadow:0 4px 16px rgba(0,0,0,.35);
    border:1px solid rgba(0,0,0,.25);
    pointer-events:none;
  }

  .set{
    left:auto;
    right:auto;
    min-height:34px;
    padding:6px 5px !important;
    border-radius:9px;
    border-width:1.5px;
    z-index:4;
  }

  .set.selected{
    z-index:35;
  }

  .artist{
    font-size:10.6px !important;
    line-height:1.08;
    font-weight:800;
  }

  .time{
    font-size:9.6px !important;
    margin-top:3px;
    font-weight:600;
  }

  .footer{
    position:relative;
    right:auto;
    bottom:auto;
    margin-top:10px;
    font-size:12px;
    width:100%;
    color:#fff;
    text-shadow:0 0 12px rgba(255,94,219,.45), 0 0 18px rgba(102,230,255,.25);
  }

  .note{
    font-size:12px;
    padding:0 4px;
  }
}

    height:auto !important;
    background:none !important;

    min-width:calc(var(--mobileLabelWidth) + var(--activeMobileTimelineWidth, var(--mobileTimelineWidth)));
    background:
      repeating-linear-gradient(
        to right,
        transparent 0,
        transparent calc((var(--activeMobileTimelineWidth, var(--mobileTimelineWidth)) / var(--activeDurationHours, 12.5)) - 1px),
        rgba(255,255,255,.18) calc((var(--activeMobileTimelineWidth, var(--mobileTimelineWidth)) / var(--activeDurationHours, 12.5)) - 1px),
        rgba(255,255,255,.18) calc(var(--activeMobileTimelineWidth, var(--mobileTimelineWidth)) / var(--activeDurationHours, 12.5))
      );
    background-position:var(--mobileLabelWidth) 0;
  }

  .mobileStageRow{
    position:relative;
    height:var(--mobileRowHeight);
    min-width:calc(var(--mobileLabelWidth) + var(--activeMobileTimelineWidth, var(--mobileTimelineWidth)));
    background:
      repeating-linear-gradient(
        to right,
        transparent 0,
        transparent calc((var(--activeMobileTimelineWidth, var(--mobileTimelineWidth)) / var(--activeDurationHours, 12.5)) - 1px),
        rgba(255,255,255,.18) calc((var(--activeMobileTimelineWidth, var(--mobileTimelineWidth)) / var(--activeDurationHours, 12.5)) - 1px),
        rgba(255,255,255,.18) calc(var(--activeMobileTimelineWidth, var(--mobileTimelineWidth)) / var(--activeDurationHours, 12.5))
      ),
      linear-gradient(to bottom, transparent calc(100% - 1px), rgba(255,255,255,.18) calc(100% - 1px));

  .mobileTimeLabel{
    top:0 !important;
  }

  .mobileStageLabel{

    opacity:.35 !important;
    z-index:-1 !important;
  }

  .board,
  .scheduleScroll,
  .grid{
    isolation:isolate;
  }
}

/* Button press feedback only (no release animation) */
button{
  transition:
    transform .10s ease,
    box-shadow .18s ease,
    filter .18s ease,
    background .18s ease;
}

button:active{
  transform:scale(.96);
  filter:brightness(1.12) saturate(1.1);
}

/* Toast pops up from bottom, then falls and fades */
.toast{
  bottom:auto !important;
  top:100dvh;
  transform:translate(-50%, 0) scale(.92) !important;
  opacity:0;
}

.toast.show{
  animation:toastPopArc 2.35s cubic-bezier(.18,.9,.2,1) forwards;
}

@keyframes toastPopArc{
  0%{
    opacity:0;
    transform:translate(-50%, 28px) scale(.90);
    top:100dvh;
  }
  12%{
    opacity:1;
    transform:translate(-50%, -6px) scale(1.04);
    top:66dvh;
  }
  22%{
    opacity:1;
    transform:translate(-50%, 0) scale(1);
    top:67dvh;
  }
  72%{
    opacity:1;
    transform:translate(-50%, 0) scale(1);
    top:67dvh;
  }
  100%{
    opacity:0;
    transform:translate(-50%, 34px) scale(.96);
    top:100dvh;
  }
}

@supports not (height:100dvh){
  .toast{ top:100vh; }
  @keyframes toastPopArc{
    0%{ opacity:0; transform:translate(-50%, 28px) scale(.90); top:100vh; }
    12%{ opacity:1; transform:translate(-50%, -6px) scale(1.04); top:66vh; }
    22%{ opacity:1; transform:translate(-50%, 0) scale(1); top:67vh; }
    72%{ opacity:1; transform:translate(-50%, 0) scale(1); top:67vh; }
    100%{ opacity:0; transform:translate(-50%, 34px) scale(.96); top:100vh; }
  }
}

<body>
<div class="app">
  <h1>EDC Las Vegas</h1>

  </div>
  <div class="controls">

</div>

<script>

const IS_STANDALONE = window.navigator.standalone === true || window.matchMedia("(display-mode: standalone)").matches;
if(IS_STANDALONE){

const mobileQuery = window.matchMedia("(max-width: 700px)");

const TIME_LABELS = [
  ["5 pm",17],["6 pm",18],["7 pm",19],["8 pm",20],["9 pm",21],
  ["10 pm",22],["11 pm",23],["12 am",24],["1 am",25],["2 am",26],

];

function cssPx(varName, fallback){
  const raw = getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
  const value = Number.parseFloat(raw);
  return Number.isFinite(value) ? value : fallback;
}

function getMobileTimelineWidth(){
  return cssPx("--mobileTimelineWidth", 1720);
}

function getMobileLabelWidth(){
  return cssPx("--mobileLabelWidth", 104);
}

const hourCache = new Map();

function toHour(t){
  if(hourCache.has(t)) return hourCache.get(t);

  const m = String(t).trim().match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
  if(!m) throw new Error("Invalid time: " + t);

  let h = Number(m[1]);
  const min = Number(m[2]);
  const ap = m[3].toUpperCase();

  if(ap === "PM" && h !== 12) h += 12;
  if(ap === "AM" && h === 12) h = 0;

  // EDC schedule runs overnight, so all AM slots belong to the next day.
  if(ap === "AM") h += 24;

  const result = h + min / 60;
  hourCache.set(t, result);
  return result;
}

function shortStage(s){ return s.replace(" Field","\nField").replace(" Grounds","\nGrounds").replace(" Meadow","\nMeadow").replace(" Garden","\nGarden").replace(" Valley","\nValley").replace(" Bloom","\nBloom").replace(" Jungle","\nJungle"); }
function setId(day, stage, artist, start){ return [day,stage,artist,start].join("|"); }
function fmtRange(start,end){ return start.replace(":00 ","").toLowerCase()+" - "+end.replace(":00 ","").toLowerCase(); }

function getActiveStart(day=currentDay){
  return day === "Day 1" ? 17 : 19;
}

function getActiveDuration(day=currentDay){
  return END - getActiveStart(day);
}

function getActiveMobileTimelineWidth(day=currentDay){
  const baseWidth = getMobileTimelineWidth();
  const baseDuration = END - 17;
  return baseWidth * (getActiveDuration(day) / baseDuration);
}

function timeLabelsForDay(day=currentDay){
  const start = getActiveStart(day);
  return TIME_LABELS.filter(([,h]) => h >= start && h <= END);
}

function renderTimeAxis(){
  const axis = document.getElementById("timeAxis");
  axis.innerHTML = "";

  if(isMobileLayout()) return;

  const activeStart = getActiveStart();
  const activeDuration = getActiveDuration();
  const frag = document.createDocumentFragment();

  timeLabelsForDay().forEach(([label,h])=>{
    const d=document.createElement("div");
    d.className="timeLabel";
    d.textContent=label;
    d.style.top = ((h-activeStart)/activeDuration*100)+"%";
    frag.appendChild(d);
  });

  axis.appendChild(frag);
}

function render(day){
  currentDay = day;
  document.getElementById("dayTitle").textContent = day + " Schedule";
  document.querySelectorAll(".dayButtons button[data-day]").forEach(b=>b.classList.toggle("active", b.dataset.day===day));

  const activeStart = getActiveStart(day);
  const activeDuration = getActiveDuration(day);
  document.documentElement.style.setProperty("--activeDurationHours", activeDuration);
  document.documentElement.style.setProperty("--activeMobileTimelineWidth", getActiveMobileTimelineWidth(day) + "px");

  renderTimeAxis();

  const headers=document.getElementById("stageHeaders");
  const grid=document.getElementById("grid");
  headers.innerHTML="";
  grid.innerHTML="";

  if(isMobileLayout()){
    const mobileWidth = getActiveMobileTimelineWidth(day);
    const labelWidth = getMobileLabelWidth();

    const frag = document.createDocumentFragment();

    const axisRow = document.createElement("div");
    axisRow.className = "mobileAxisRow";
    timeLabelsForDay(day).forEach(([label,h])=>{
      const t=document.createElement("div");
      t.className="mobileTimeLabel";
      t.textContent=label;
      t.style.left = (labelWidth + ((h-activeStart)/activeDuration)*mobileWidth) + "px";
      axisRow.appendChild(t);
    });
    frag.appendChild(axisRow);

    STAGES.forEach((stage)=>{
      const row = document.createElement("div");
      row.className = "mobileStageRow";

      const stageLabel = document.createElement("div");
      stageLabel.className = "mobileStageLabel";
      stageLabel.style.background = COLORS[stage];
      stageLabel.textContent = shortStage(stage);
      row.appendChild(stageLabel);

      (DATA[day][stage]||[]).forEach(([artist,start,end])=>{
        const startHour = toHour(start);
        const endHour = toHour(end);
        const left = labelWidth + ((startHour-activeStart)/activeDuration)*mobileWidth;
        const width = ((endHour-startHour)/activeDuration)*mobileWidth;
        const id=setId(day,stage,artist,start);

        const el=document.createElement("div");
        el.className="set" + (selected.has(id) ? " selected" : "");
        el.style.background=COLORS[stage];
        el.style.left=left+"px";
        el.style.width=Math.max(width, 86)+"px";
        el.style.top="5px";
        el.style.height="calc(var(--mobileRowHeight) - 10px)";
        el.dataset.id=id;
        el.dataset.day=day;
        el.dataset.stage=stage;
        el.dataset.artist=artist;
        el.dataset.startHour=String(startHour);
        el.dataset.endHour=String(endHour);
        el.innerHTML=`<div class="artist">${artist}</div><div class="time">${fmtRange(start,end)}</div>`;
        el.title=`${artist} — ${stage} — ${start} to ${end}`;
        row.appendChild(el);
      });

      frag.appendChild(row);
    });

    grid.appendChild(frag);
    updateConflictHighlights();
    return;
  }

  STAGES.forEach(stage=>{
    const h=document.createElement("div");
    h.className="stageHead";
    h.style.background=COLORS[stage];
    h.textContent=shortStage(stage);
    headers.appendChild(h);
  });

  STAGES.forEach(stage=>{
    const col=document.createElement("div");
    col.className="col";
    (DATA[day][stage]||[]).forEach(([artist,start,end])=>{
      const top=(toHour(start)-activeStart)/activeDuration*100;
      const height=(toHour(end)-toHour(start))/activeDuration*100;
      const el=document.createElement("div");
      const id=setId(day,stage,artist,start);
      el.className="set" + (selected.has(id) ? " selected" : "");
      el.style.background=COLORS[stage];
      el.style.top=top+"%";
      el.style.height=height+"%";
      el.dataset.id=id;
      el.dataset.day=day;
      el.dataset.stage=stage;
      el.dataset.artist=artist;
      el.dataset.startHour=String(toHour(start));
      el.dataset.endHour=String(toHour(end));
      el.innerHTML=`<div class="artist">${artist}</div><div class="time">${fmtRange(start,end)}</div>`;
      el.title=`${artist} — ${stage} — ${start} to ${end}`;
      col.appendChild(el);
    });
    grid.appendChild(col);
  });

  updateConflictHighlights();
}



const gridEl = document.getElementById("grid");
const pressedEls = new Set();
const TAP_MOVE_LIMIT = 8;
const TAP_INTENT_DELAY = 90;
let activeSetTap = null;

function rangesOverlap(a, b){
  return a.start < b.end && b.start < a.end;
}

function updateConflictHighlights(){
  const selectedSets = [...document.querySelectorAll(".set.selected")].map(el=>({
    el,
    id:el.dataset.id,
    start:Number(el.dataset.startHour),
    end:Number(el.dataset.endHour)
  })).filter(item=>Number.isFinite(item.start) && Number.isFinite(item.end));

  selectedSets.forEach(item=>item.el.classList.remove("conflict"));

  for(let i=0; i<selectedSets.length; i++){
    for(let j=i+1; j<selectedSets.length; j++){
      if(rangesOverlap(selectedSets[i], selectedSets[j])){
        selectedSets[i].el.classList.add("conflict");
        selectedSets[j].el.classList.add("conflict");
      }
    }
  }
}

function toggleSetHighlight(set){
  const id = set.dataset.id;

  if(selected.has(id)){
    selected.delete(id);
    set.classList.remove("selected", "conflict");
  } else {
    selected.add(id);
    set.classList.add("selected");
  }

  saveSelected();
  updateConflictHighlights();
}

function trackPress(el, className){
  el.classList.add(className);
  pressedEls.add([el, className]);
}

function clearPressStates(){
  pressedEls.forEach(([el, className])=>el.classList.remove(className));
  pressedEls.clear();
}

function clearActiveSetTap(){
  if(activeSetTap?.timer) clearTimeout(activeSetTap.timer);
  activeSetTap = null;
}

function commitActiveSetTap(){
  if(!activeSetTap || activeSetTap.cancelled || activeSetTap.committed) return;
  activeSetTap.committed = true;
  activeSetTap.set.dataset.pointerToggled = "1";
  toggleSetHighlight(activeSetTap.set);
}

gridEl.addEventListener("pointerdown", (e)=>{
  if(e.pointerType === "mouse" && e.button !== 0) return;

  const set = e.target.closest(".set");
  if(!set || !gridEl.contains(set)) return;

  clearActiveSetTap();

  activeSetTap = {
    set,
    pointerId:e.pointerId,
    startX:e.clientX,
    startY:e.clientY,
    cancelled:false,
    committed:false,
    timer:setTimeout(commitActiveSetTap, TAP_INTENT_DELAY)
  };

  if(isMobileLayout()){
    trackPress(set, "mobile-set-pressing");
  }
}, {passive:true});

gridEl.addEventListener("pointermove", (e)=>{
  if(!activeSetTap || e.pointerId !== activeSetTap.pointerId) return;

  const dx = Math.abs(e.clientX - activeSetTap.startX);
  const dy = Math.abs(e.clientY - activeSetTap.startY);

  // Any real drag should become scrolling, not highlighting.
  // This keeps taps responsive while letting vertical page scroll and horizontal timeline scroll work normally.
  if(dx > TAP_MOVE_LIMIT || dy > TAP_MOVE_LIMIT){
    activeSetTap.cancelled = true;
    clearActiveSetTap();
    clearPressStates();
  }
}, {passive:true});

gridEl.addEventListener("pointerup", (e)=>{
  if(!activeSetTap || e.pointerId !== activeSetTap.pointerId) return;

  // Very quick taps may end before the short intent timer; still treat those as taps.
  commitActiveSetTap();
  clearActiveSetTap();
}, {passive:true});

gridEl.addEventListener("pointercancel", ()=>{
  clearActiveSetTap();
}, {passive:true});

// Keyboard / older-browser fallback. Synthetic clicks after pointerdown are ignored.
gridEl.addEventListener("click", (e)=>{
  const set = e.target.closest(".set");
  if(!set || !gridEl.contains(set)) return;

  if(set.dataset.pointerToggled === "1"){
    delete set.dataset.pointerToggled;
    return;
  }

  toggleSetHighlight(set);
});

document.addEventListener("pointerdown", (e)=>{
  const button = e.target.closest("button");
  if(button && isMobileLayout()){
    trackPress(button, "mobile-pressing");
  }
}, {passive:true});

document.addEventListener("pointerup", clearPressStates, {passive:true});
document.addEventListener("pointercancel", ()=>{
  clearPressStates();
  clearActiveSetTap();
}, {passive:true});

let _allSetsCache = null;
function allSets(){
  if(_allSetsCache) return _allSetsCache;
  const out=[];
  Object.keys(DATA).forEach(day=>STAGES.forEach(stage=>(DATA[day][stage]||[]).forEach(([artist,start,end])=>out.push({day,stage,artist,start,end}))));
  _allSetsCache = out;
  return out;
}
const search=document.getElementById("search"), results=document.getElementById("results");

search.addEventListener("input",()=>{
  const q=search.value.trim().toLowerCase();
  results.innerHTML="";
  if(!q){results.style.display="none";return;}
  const matches=allSets().filter(s=>s.artist.toLowerCase().includes(q)).slice(0,25);
  matches.forEach(s=>{
    const r=document.createElement("div");
    r.className="result";
    r.innerHTML=`<b>${s.artist}</b><small>${s.day} • ${s.stage} • ${fmtRange(s.start,s.end)}</small>`;
    r.onclick=()=>{
      render(s.day);
      search.value=s.artist;
      results.style.display="none";
      setTimeout(()=>{
        const id=setId(s.day,s.stage,s.artist,s.start);
        const el=[...document.querySelectorAll(".set")].find(x=>x.dataset.id===id);
        if(el){
          const scroller = document.querySelector(".scheduleScroll");
          if(isMobileLayout() && scroller){
            scroller.scrollLeft = Math.max(0, el.offsetLeft - getMobileLabelWidth() - 20);
           
          } else {
            el.scrollIntoView({block:"center", inline:"center"});
          }
          if(!selected.has(id)){
            el.classList.add("selected");
            selected.add(id);
            saveSelected();
          }
          updateConflictHighlights();
        }
      }, 50);
    };
    results.appendChild(r);
  });
  results.style.display=matches.length ? "block" : "none";
});
document.addEventListener("click",(e)=>{ if(!e.target.closest(".searchWrap")) results.style.display="none"; });
document.querySelectorAll(".dayButtons button[data-day]").forEach(b=>b.onclick=()=>{
  render(b.dataset.day);
});
function clearCurrentDaySelections(){
  for(const id of selected){
    if(id.startsWith(currentDay + "|")) selected.delete(id);
  }
  saveSelected();
  render(currentDay);
}

let toastTimer;
function showToast(message){
  const toast = document.getElementById("toast");
  if(!toast) return;
  toast.textContent = message;
  toast.classList.remove("show");
  void toast.offsetWidth;
  toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toast.classList.remove("show"), 2350);
}

const gridToggle = document.getElementById("gridToggle");
gridToggle.onclick = ()=>{
  const isOn = document.body.classList.toggle("grid-overlay");
  gridToggle.textContent = isOn ? "Grid Overlay: On" : "Grid Overlay: Off";
  gridToggle.setAttribute("aria-pressed", String(isOn));
};



const stageToggle = document.getElementById("stageToggle");
if(stageToggle){
  stageToggle.onclick = ()=>{
    const isHidden = document.body.classList.toggle("stage-names-hidden");
    stageToggle.textContent = isHidden ? "Show Stage Names" : "Hide Stage Names";
    stageToggle.setAttribute("aria-pressed", String(isHidden));
  };
}

document.getElementById("clear").onclick=()=>{
  clearCurrentDaySelections();
  showToast("All selected sets have been cleared ✨");
};

let resizeTimer;
window.addEventListener("resize", ()=>{
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(()=>{ render(currentDay); }, 150);
});








render(currentDay);
</script>
